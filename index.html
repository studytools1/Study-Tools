<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tools - Calculadora de Notas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .header p {
            font-size: 14px;
            color: #a0a0a0;
            letter-spacing: 0.5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .tool-section {
            margin-bottom: 20px;
        }

        .tool-section h2 {
            font-size: 18px;
            color: #00d4ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-icon {
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b0b0b0;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #606060;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #001a33;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-calculate:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.08);
            color: #a0a0a0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
        }

        .btn-ask {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #001a33;
            flex: 1;
        }

        .btn-ask:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-ask:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .ai-response-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            display: none;
        }

        .ai-response-box.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            color: #a0a0a0;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 36px;
            color: #00d4ff;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .result-details {
            margin-top: 12px;
            font-size: 13px;
            color: #80b0c0;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .result-detail {
            flex: 1;
        }

        .performance-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }

        .performance-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .performance-badge.excellent {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }

        .performance-badge.good {
            background: rgba(100, 200, 255, 0.2);
            color: #64c8ff;
            border: 1px solid rgba(100, 200, 255, 0.4);
        }

        .performance-badge.fair {
            background: rgba(255, 200, 100, 0.2);
            color: #ffc864;
            border: 1px solid rgba(255, 200, 100, 0.4);
        }

        .performance-badge.needs-improvement {
            background: rgba(255, 150, 150, 0.2);
            color: #ff9696;
            border: 1px solid rgba(255, 150, 150, 0.4);
        }

        .performance-description {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .motivational-message {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00d4ff;
            padding: 12px 15px;
            border-radius: 5px;
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.6;
            font-style: italic;
        }

        .motivational-message.excellent {
            border-left-color: #00ff64;
        }

        .motivational-message.good {
            border-left-color: #64c8ff;
        }

        .motivational-message.fair {
            border-left-color: #ffc864;
        }

        .motivational-message.needs-improvement {
            border-left-color: #ff9696;
        }

        .ai-response-text {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.8;
            color: #c8e6ff;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.04);
            border-left: 3px solid #00d4ff;
            padding: 12px 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #a0a0a0;
            line-height: 1.6;
        }

        .section-divider {
            height: 1px;
            background: rgba(0, 212, 255, 0.2);
            margin: 30px 0;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            .header h1 {
                font-size: 28px;
            }

            .result-value {
                font-size: 28px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            textarea {
                min-height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Study Tools</h1>
            <p>Herramientas de estudio</p>
        </div>

        <div class="card">
            <!-- CALCULADORA DE MEDIA -->
            <div class="tool-section">
                <h2>
                    <span class="tool-icon">📊</span>
                    Calculadora de Media
                </h2>

                <div class="input-group">
                    <label for="notas">Ingresa tus notas</label>
                    <input 
                        type="text" 
                        id="notas" 
                        placeholder="Ejemplo: 12, 14, 16, 18, 20"
                        autocomplete="off"
                    >
                    <div class="error-message" id="errorMessage"></div>
                </div>

                <div class="button-group">
                    <button class="btn-calculate" onclick="calcularMedia()">Calcular</button>
                    <button class="btn-clear" onclick="limpiar()">Limpiar</button>
                </div>

                <div class="result-box" id="resultBox">
                    <div class="result-label">Tu media es:</div>
                    <div class="result-value" id="mediaValue">0.00</div>
                    <div class="result-details">
                        <div class="result-detail">
                            <strong>Total notas:</strong>
                            <div id="totalNotas">0</div>
                        </div>
                        <div class="result-detail">
                            <strong>Mayor:</strong>
                            <div id="notaMayor">0</div>
                        </div>
                        <div class="result-detail">
                            <strong>Menor:</strong>
                            <div id="notaMenor">0</div>
                        </div>
                    </div>

                    <div class="performance-section">
                        <div class="performance-badge" id="performanceBadge"></div>
                        <div class="performance-description" id="performanceDescription"></div>
                        <div class="motivational-message" id="motivationalMessage"></div>
                    </div>
                </div>

                <div class="info-box">
                    💡 Separa las notas con comas. Ejemplo: <strong>12, 14, 16, 18, 20</strong>
                </div>
            </div>

            <!-- DIVISOR -->
            <div class="section-divider"></div>

            <!-- STUDY AI -->
            <div class="tool-section">
                <h2>
                    <span class="tool-icon">🤖</span>
                    Study AI
                </h2>

                <div class="input-group">
                    <label for="pregunta">¿En qué necesitas ayuda?</label>
                    <textarea 
                        id="pregunta" 
                        placeholder="Ejemplo: ¿Cómo se resuelven ecuaciones de segundo grado? o Necesito consejos para estudiar francés"
                        autocomplete="off"
                    ></textarea>
                    <div class="error-message" id="aiErrorMessage"></div>
                </div>

                <div class="button-group">
                    <button class="btn-ask" onclick="hacerPregunta()">Preguntar</button>
                </div>

                <div class="ai-response-box" id="aiResponseBox">
                    <div class="ai-response-text" id="aiResponse"></div>
                </div>

                <div class="info-box">
                    💡 Puedes preguntar sobre: matemáticas, francés, cómo mejorar tus notas, y más.
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputNotas = document.getElementById('notas');
        const resultBox = document.getElementById('resultBox');
        const errorMessage = document.getElementById('errorMessage');

        // Permitir calcular con Enter
        inputNotas.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcularMedia();
            }
        });

        // CALCULADORA DE MEDIA
        function getPerformanceData(media) {
            if (media >= 16) {
                return {
                    level: 'excellent',
                    badge: '⭐ Excelente Rendimiento',
                    description: 'Has demostrado un rendimiento excepcional. ¡Tus calificaciones están en el nivel más alto!',
                    motivation: '🌟 ¡Felicidades! Estás dominando perfectamente estos temas. Sigue manteniendo este excelente desempeño y considera ayudar a otros compañeros.'
                };
            } else if (media >= 12) {
                return {
                    level: 'good',
                    badge: '✅ Buen Trabajo',
                    description: 'Tu rendimiento es sólido y estable. Estás en buen camino.',
                    motivation: '💪 ¡Muy bien! Has mostrado un buen desempeño. Con un poco más de esfuerzo puedes alcanzar la excelencia.'
                };
            } else if (media >= 10) {
                return {
                    level: 'fair',
                    badge: '📌 Justo Aprobado',
                    description: 'Has aprobado, pero hay espacio para mejorar significativamente.',
                    motivation: '🎯 No te desanimes. Cada paso forward cuenta. Identifica las áreas difíciles y dedica más tiempo a ellas. ¡Puedes hacerlo mejor!'
                };
            } else {
                return {
                    level: 'needs-improvement',
                    badge: '📚 Necesita Mejorar',
                    description: 'Requieres mayor dedicación y esfuerzo para mejorar tus calificaciones.',
                    motivation: '🤝 Sabemos que puede ser desafiante, pero recuerda que el esfuerzo constante siempre trae resultados. Busca ayuda si la necesitas y no te rindas.'
                };
            }
        }

        function calcularMedia() {
            errorMessage.classList.remove('show');
            resultBox.classList.remove('show');

            const valor = inputNotas.value.trim();

            if (!valor) {
                mostrarError('Por favor, ingresa al menos una nota');
                return;
            }

            try {
                // Dividir por comas y convertir a números
                const notas = valor
                    .split(',')
                    .map(n => {
                        const num = parseFloat(n.trim());
                        if (isNaN(num)) {
                            throw new Error('formato');
                        }
                        return num;
                    });

                if (notas.length === 0) {
                    mostrarError('Por favor, ingresa al menos una nota');
                    return;
                }

                // Validar que las notas sean válidas (normalmente entre 0 y 20)
                const notasValidas = notas.every(n => n >= 0 && n <= 20);
                if (!notasValidas) {
                    mostrarError('Las notas deben estar entre 0 y 20');
                    return;
                }

                // Calcular media
                const suma = notas.reduce((a, b) => a + b, 0);
                const media = suma / notas.length;
                const mayor = Math.max(...notas);
                const menor = Math.min(...notas);

                // Obtener datos de rendimiento
                const performanceData = getPerformanceData(media);

                // Mostrar resultados
                document.getElementById('mediaValue').textContent = media.toFixed(2);
                document.getElementById('totalNotas').textContent = notas.length;
                document.getElementById('notaMayor').textContent = mayor;
                document.getElementById('notaMenor').textContent = menor;

                // Mostrar datos de rendimiento
                const badge = document.getElementById('performanceBadge');
                const description = document.getElementById('performanceDescription');
                const motivation = document.getElementById('motivationalMessage');

                badge.textContent = performanceData.badge;
                badge.className = `performance-badge ${performanceData.level}`;

                description.textContent = performanceData.description;

                motivation.textContent = performanceData.motivation;
                motivation.className = `motivational-message ${performanceData.level}`;

                resultBox.classList.add('show');

            } catch (e) {
                if (e.message === 'formato') {
                    mostrarError('Formato inválido. Usa números separados por comas');
                } else {
                    mostrarError('Error al procesar las notas');
                }
            }
        }

        function limpiar() {
            inputNotas.value = '';
            resultBox.classList.remove('show');
            errorMessage.classList.remove('show');
            inputNotas.focus();
        }

        function mostrarError(mensaje) {
            errorMessage.textContent = mensaje;
            errorMessage.classList.add('show');
        }

        // STUDY AI
        const inputPregunta = document.getElementById('pregunta');
        const aiResponseBox = document.getElementById('aiResponseBox');
        const aiErrorMessage = document.getElementById('aiErrorMessage');

        // Permitir enviar con Ctrl+Enter
        inputPregunta.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                hacerPregunta();
            }
        });

        function obtenerRespuestaIA(pregunta) {
            const preguntaLower = pregunta.toLowerCase();

            // Palabras clave para matemáticas
            if (preguntaLower.includes('mate') || preguntaLower.includes('matemática') || 
                preguntaLower.includes('ecuación') || preguntaLower.includes('álgebra') ||
                preguntaLower.includes('geometría') || preguntaLower.includes('cálculo')) {
                return `📐 <strong>Consejos para Matemáticas:</strong><br>
                <br>
                • <strong>Practica regularmente:</strong> Resuelve ejercicios diariamente, no solo antes de exámenes.<br>
                • <strong>Entiende los conceptos:</strong> No memorices fórmulas, comprende por qué funcionan.<br>
                • <strong>Organiza tus apuntes:</strong> Crea mapas conceptuales para visualizar relaciones.<br>
                • <strong>Revisa errores:</strong> Cuando cometas un error, analiza dónde fallaste.<br>
                • <strong>Busca patrones:</strong> Muchos problemas siguen estructuras similares.<br>
                <br>
                💡 Recuerda: Las matemáticas se aprenden haciendo, no leyendo. ¡Practica mucho!`;
            }

            // Palabras clave para francés
            if (preguntaLower.includes('francés') || preguntaLower.includes('frances') ||
                preguntaLower.includes('idioma') || preguntaLower.includes('lengua')) {
                return `🇫🇷 <strong>Consejos para Estudiar Francés:</strong><br>
                <br>
                • <strong>Escucha activamente:</strong> Mira películas, series y escucha música en francés.<br>
                • <strong>Practica la pronunciación:</strong> Habla en voz alta, aunque sea solo contigo.<br>
                • <strong>Aprende por contexto:</strong> No memorizas palabras aisladas, úsalas en frases.<br>
                • <strong>Haz ejercicios de escritura:</strong> Escribe diarios o cartas cortas.<br>
                • <strong>Interactúa con nativos:</strong> Busca intercambios de idiomas o grupos en línea.<br>
                • <strong>Repasa vocabulario:</strong> Usa flashcards para reforzar palabras clave.<br>
                <br>
                💡 La clave es la inmersión. Cuanto más expongas tu oído al francés, más rápido aprenderás.`;
            }

            // Palabras clave para mejorar notas/rendimiento
            if (preguntaLower.includes('media') || preguntaLower.includes('nota') ||
                preguntaLower.includes('rendimiento') || preguntaLower.includes('calificación') ||
                preguntaLower.includes('mejorar') || preguntaLower.includes('aprobar')) {
                return `📈 <strong>Cómo Mejorar tus Notas:</strong><br>
                <br>
                • <strong>Organiza tu tiempo:</strong> Crea un horario de estudio realista y cúmplelo.<br>
                • <strong>Identifica tus debilidades:</strong> Usa la calculadora de media para analizarlas.<br>
                • <strong>Estudia en bloques:</strong> 45-50 minutos de concentración + 10 minutos de descanso.<br>
                • <strong>Prepárate para exámenes:</strong> Comienza con anticipación, no la noche anterior.<br>
                • <strong>Busca ayuda cuando la necesites:</strong> Pregunta a tu profesor o compañeros.<br>
                • <strong>Duerme bien:</strong> El descanso es fundamental para la memoria y concentración.<br>
                • <strong>Mantén la motivación:</strong> Celebra pequeños avances y no te desanimes.<br>
                <br>
                💡 La consistencia es más importante que la intensidad. Pequeños esfuerzos diarios dan grandes resultados.`;
            }

            // Respuesta por defecto si no se reconoce
            return `❓ <strong>No estoy seguro de tu pregunta.</strong><br>
            <br>
            Por favor, intenta reformularla. Puedo ayudarte con:<br>
            • <strong>Matemáticas:</strong> ecuaciones, álgebra, geometría...<br>
            • <strong>Francés:</strong> vocabulario, pronunciación, gramática...<br>
            • <strong>Rendimiento académico:</strong> cómo mejorar tus notas y estudiar mejor.<br>
            <br>
            💡 Sé más específico en tu pregunta para obtener una mejor respuesta.`;
        }

        function hacerPregunta() {
            aiErrorMessage.classList.remove('show');
            aiResponseBox.classList.remove('show');

            const pregunta = inputPregunta.value.trim();

            if (!pregunta) {
                mostrarErrorIA('Por favor, escribe tu pregunta o duda');
                return;
            }

            try {
                const respuesta = obtenerRespuestaIA(pregunta);
                
                document.getElementById('aiResponse').innerHTML = respuesta;
                aiResponseBox.classList.add('show');

            } catch (e) {
                mostrarErrorIA('Error al procesar tu pregunta. Intenta de nuevo.');
            }
        }

        function mostrarErrorIA(mensaje) {
            aiErrorMessage.textContent = mensaje;
            aiErrorMessage.classList.add('show');
        }

        // Enfocar en el input al cargar
        window.addEventListener('load', function() {
            inputNotas.focus();
        });
    </script>
</body>
</html>
